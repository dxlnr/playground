name: Run Unittests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  unittest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python:
          - { version: "3.13" , env: "py313" }
    runs-on: ${{ matrix.os }}
    name: unittest (${{ matrix.os }}, ${{ matrix.python.version }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python.version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python.version }}

      - name: Windows Setup
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        shell: bash
        run: |
          chmod +x install.sh
          ./install.sh
          pip install -r requirements.txt

      - name: Build
        run: |
          CORES=$(getconf _NPROCESSORS_ONLN)
          scons -j"$CORES"
      - name: cctest
        run: |
          ./tests/test_runner
      - name: pytest
        run: |
          python -m unittest discover -s tests
